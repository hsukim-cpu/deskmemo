<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    background: transparent !important; border: none !important;
    padding: 12px; display: flex;
    color: #3F3B33;
  }
  /* 右下折角 */
  #paper::after {
    content: ""; position: absolute; right: 0; bottom: 0;
    width: 30px; height: 30px; pointer-events: none;
    background: linear-gradient(to top left, #DFD8C6 50%, transparent 50.5%);
  }
  #pin {
    position: absolute; left: 50%; top: 6px; transform: translateX(-50%);
    width: 30px; height: 34px;
    filter: drop-shadow(1px 2px 1.5px rgba(0,0,0,.3));
  }
  .card { text-align: center; padding: 24px; }
  .count { font-size: 60px; font-weight: 700; color: #C2452F; line-height: 1.1; }
  .count small { font-size: 20px; font-weight: 600; color: #3F3B33; margin-left: 6px; }
  .msg { margin-top: 12px; font-size: 16px; letter-spacing: 1px; }
  .sub { margin-top: 6px; font-size: 13px; color: rgba(0,0,0,.45); }
  .actions { margin-top: 24px; display: flex; gap: 12px; justify-content: center; }
  button {
    border: none; border-radius: 7px; padding: 10px 24px;
    font-size: 14px; font-family: inherit; cursor: pointer; letter-spacing: 1px;
  }
  #ok { background: #3F3B33; color: #F5F1E6; font-weight: 700; }
  #ok:hover { background: #5E5346; }
  #quit { background: transparent; color: rgba(0,0,0,.45); border: 1px solid rgba(0,0,0,.25); }
  #quit:hover { color: #3F3B33; border-color: rgba(0,0,0,.5); }
  #paper {
    flex: 1; position: relative;
    display: flex; align-items: center; justify-content: center;
    background:
      linear-gradient(155deg, rgba(255,255,255,.45) 0%, rgba(255,255,255,0) 42%),
      #F5F1E6;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,.18)) drop-shadow(0 7px 16px rgba(0,0,0,.26));
    clip-path: polygon(1px 1.4px, 30% 0.2px, 60% 1.2px, calc(100% - 1.2px) 1.6px, 100% 30%, calc(100% - 1.4px) 60%, calc(100% - 1.6px) calc(100% - 1.2px), 60% calc(100% - 0.3px), 28% calc(100% - 1.5px), 0.6px calc(100% - 1.6px), 1.5px 66%, 0px 33%);
  }
</style>
</head>
<body>
  <div id="paper">
  <svg id="pin" viewBox="0 0 26 30">
    <line x1="13" y1="13" x2="13" y2="27" stroke="#9A9A9A" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="13" cy="9" r="7.5" fill="#D8413C"/>
    <circle cx="13" cy="9" r="7.5" fill="none" stroke="#B22F2B" stroke-width="1"/>
    <circle cx="10.5" cy="6.5" r="2.4" fill="#F08A86"/>
  </svg>
  <div class="card">
    <div class="count"><span id="n"></span><small>張便利貼還沒處理</small></div>
    <div class="msg" id="msg"></div>
    <div class="sub" id="sub"></div>
    <div class="actions">
      <button id="ok">回去處理</button>
      <button id="quit" style="display:none">仍要離開</button>
    </div>
  </div>
<script>
  const { ipcRenderer } = require('electron')
  const q = new URLSearchParams(location.search)
  document.getElementById('n').textContent = q.get('count') || '0'
  const kind = q.get('kind')
  const msg = document.getElementById('msg')
  const sub = document.getElementById('sub')

  if (kind === 'shutdown') {
    msg.textContent = '確定要關機／離開嗎？'
    sub.textContent = '離開之後就不會再提醒你了'
    document.getElementById('quit').style.display = ''
  } else {
    msg.textContent = '電腦睡著前你留了便利貼'
    sub.textContent = '看一眼再繼續吧'
  }

  document.getElementById('ok').onclick = () => window.close()
  document.getElementById('quit').onclick = () => ipcRenderer.send('force-quit')

  // 警示音：三短嗶
  try {
    const ctx = new AudioContext()
    const beep = (t) => {
      const o = ctx.createOscillator()
      const g = ctx.createGain()
      o.frequency.value = 880
      o.connect(g); g.connect(ctx.destination)
      g.gain.setValueAtTime(0.25, ctx.currentTime + t)
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.18)
      o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + 0.2)
    }
    beep(0); beep(0.3); beep(0.6)
  } catch (e) {}
</script>
  </div>
</body>
</html>
