<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>唸記帳</title>
<meta name="theme-color" content="#f4f1ea">
<!-- iPhone：加到主畫面後像 App 一樣全螢幕 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="唸記帳">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-512.png?v=5">
<link rel="icon" href="icon-512.png?v=5">
<style>
  :root{
    --paper:#f4f1ea; --card:#fcfbf7; --soft:#efeae0; --tint:#eee7da; --line:#e4ddcf;
    --txt:#3c3833; --sub:#8b8478; --faint:#bdb6a7;
    --ink:#403b34;             /* 炭墨：主要按鈕 */
    --accent:#b07a5b;          /* 安靜的陶土色：唯一點綴 */
    --accentSoft:rgba(176,122,91,.12);
    --danger:#b5563f;
    --shadow:0 1px 2px rgba(60,52,40,.04), 0 6px 18px rgba(60,52,40,.04);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; overflow-x:hidden; color:var(--txt); background:var(--paper);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Segoe UI","Helvetica Neue",sans-serif;
    -webkit-font-smoothing:antialiased;}
  body{padding:env(safe-area-inset-top) env(safe-area-inset-right) calc(env(safe-area-inset-bottom) + 60px) env(safe-area-inset-left);}
  .wrap{max-width:560px; margin:0 auto; padding:20px 18px;}

  /* svg 線條圖示：用 em 跟著字級縮放 */
  .i{width:1.25em; height:1.25em; display:block; fill:none; stroke:currentColor;
    stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round;}

  header{display:flex; align-items:center; gap:11px; padding:4px 2px 2px;}
  header .mark{width:34px; height:34px; border-radius:9px; background:var(--ink);
    display:flex; align-items:center; justify-content:center; color:var(--paper); font-size:18px;}
  header h1{font-size:20px; margin:0; font-weight:600; letter-spacing:3px;}
  header .sub{margin-left:auto; font-size:10.5px; color:var(--faint); letter-spacing:2.5px; text-transform:uppercase;}

  .summary{display:flex; gap:14px; margin:20px 0;}
  .sumbox{flex:1; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px;}
  .sumbox .k{font-size:11px; color:var(--sub); letter-spacing:2px;}
  .sumbox .v{font-size:25px; font-weight:600; margin-top:8px; font-variant-numeric:tabular-nums; letter-spacing:.5px; color:var(--txt);}

  .mic-card{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:22px 18px; margin:8px 0 20px; text-align:center;}
  .bigrec{display:flex; align-items:center; justify-content:center; width:104px; height:104px; margin:4px auto 0;
    border:none; border-radius:50%; background:var(--ink); color:var(--paper); transition:transform .12s, background .2s;}
  .bigrec .i{width:46px; height:46px; stroke-width:1.6;}
  .bigrec:active{transform:scale(.95);}
  .bigrec.live{background:var(--accent); animation:pulse 1.2s infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(176,122,91,.45)} 50%{box-shadow:0 0 0 16px rgba(176,122,91,0)}}
  .reclabel{font-size:13.5px; color:var(--sub); letter-spacing:1px; margin:16px 0 2px; line-height:1.6;}
  .manual{margin-top:18px; border-top:1px solid var(--line); padding-top:14px; text-align:left;}
  .manual summary{font-size:12px; color:var(--faint); letter-spacing:2px; cursor:pointer; list-style:none; text-align:center;}
  .manual summary::-webkit-details-marker{display:none;}
  .manual[open] summary{margin-bottom:12px;}
  #raw{width:100%; background:var(--soft); color:var(--txt);
    border:1px solid var(--line); border-radius:11px; padding:14px; font-size:17px; resize:none;
    min-height:56px; line-height:1.5; font-family:inherit; transition:border-color .15s, box-shadow .15s;}
  #raw:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accentSoft);}
  #raw::placeholder{color:var(--faint);}
  .addbtn{width:100%; margin-top:12px; border:none; border-radius:11px; padding:15px;
    background:var(--ink); color:var(--paper); font-size:15px; font-weight:500; letter-spacing:5px; transition:opacity .15s;}
  .addbtn:active{opacity:.85;}
  .mic-card .review{text-align:left;}

  /* 解析確認卡 */
  .review{background:var(--soft); border:1px solid var(--line); border-radius:13px; padding:16px; margin-top:16px; display:none;}
  .review.show{display:block; animation:fade .2s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(-3px)} to{opacity:1; transform:none}}
  .review .lbl{font-size:11px; color:var(--sub); letter-spacing:2px; margin:12px 0 7px;}
  .review .lbl:first-child{margin-top:0;}
  .amtrow{display:flex; align-items:center; gap:8px;}
  .amtrow .cur{font-size:23px; color:var(--faint);}
  #amt{flex:1; background:var(--card); border:1px solid var(--line); color:var(--txt);
    border-radius:10px; padding:12px; font-size:23px; font-weight:600; font-variant-numeric:tabular-nums;}
  #note{width:100%; background:var(--card); border:1px solid var(--line); color:var(--txt);
    border-radius:10px; padding:12px; font-size:16px; font-family:inherit;}
  #amt:focus,#note:focus,#edate:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accentSoft);}
  #edate{background:var(--card); border:1px solid var(--line); color:var(--txt); border-radius:10px; padding:11px; font-size:15px; font-family:inherit;}
  .cats{display:flex; flex-wrap:wrap; gap:8px;}
  .cat{display:flex; align-items:center; gap:6px; padding:8px 12px; border-radius:9px;
    background:var(--card); border:1px solid var(--line); color:var(--sub); font-size:14px; transition:all .12s;}
  .cat.sel{background:var(--accentSoft); color:var(--accent); border-color:var(--accent);}
  .review .acts{display:flex; gap:10px; margin-top:18px;}
  .review .acts button{flex:1; border:none; border-radius:10px; padding:13px; font-size:14px; font-weight:500; letter-spacing:3px;}
  .btn-ok{background:var(--ink); color:var(--paper);}
  .btn-cancel{background:var(--card); color:var(--sub); border:1px solid var(--line)!important;}

  /* 清單 */
  .tabs{display:flex; gap:24px; margin:24px 4px 12px; border-bottom:1px solid var(--line);}
  .tab{font-size:14px; color:var(--faint); padding:0 1px 12px; letter-spacing:2px; position:relative; transition:color .15s;}
  .tab.sel{color:var(--txt);}
  .tab.sel::after{content:""; position:absolute; left:0; right:0; bottom:-1px; height:2px; background:var(--accent);}
  .daygroup{margin-top:18px;}
  .dayhead{display:flex; justify-content:space-between; font-size:12px; color:var(--sub);
    letter-spacing:1px; padding:0 4px 9px; font-variant-numeric:tabular-nums;}
  .dayhead .sum{color:var(--txt);}
  .item{display:flex; align-items:center; gap:14px; background:var(--card); border:1px solid var(--line);
    border-radius:13px; padding:14px 16px; margin-bottom:9px;}
  .item .ico{width:40px; height:40px; border-radius:11px; background:var(--tint); color:var(--accent);
    display:flex; align-items:center; justify-content:center; font-size:20px; flex:0 0 auto;}
  .item .mid{flex:1; min-width:0;}
  .item .nm{font-size:16px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .item .ct{font-size:12px; color:var(--sub); margin-top:3px; letter-spacing:1px;}
  .item .amt{font-size:17px; font-weight:600; font-variant-numeric:tabular-nums; letter-spacing:.5px;}
  .item .del{color:var(--faint); display:flex; padding:5px; font-size:16px; margin-right:-4px;}
  .item .del:active{color:var(--danger);}
  .empty{text-align:center; color:var(--sub); padding:50px 20px; font-size:14px; line-height:1.9;}
  .empty .big{display:flex; justify-content:center; margin-bottom:16px; color:var(--faint); font-size:32px;}

  /* 月分類統計 */
  .statrow{display:flex; align-items:center; gap:13px; margin-bottom:15px;}
  .statrow .ico{width:34px; height:34px; border-radius:10px; background:var(--tint); color:var(--accent);
    display:flex; align-items:center; justify-content:center; font-size:17px; flex:0 0 auto;}
  .statrow .nm{font-size:14px; width:52px; flex:0 0 auto; letter-spacing:1px;}
  .statrow .bar{flex:1; height:7px; background:var(--soft); border-radius:4px; overflow:hidden;}
  .statrow .bar i{display:block; height:100%; background:var(--accent); border-radius:4px; opacity:.8;}
  .statrow .vv{font-size:13px; color:var(--sub); width:98px; text-align:right; font-variant-numeric:tabular-nums; flex:0 0 auto;}

  .toast{position:fixed; left:50%; bottom:calc(env(safe-area-inset-bottom) + 26px); transform:translateX(-50%) translateY(8px);
    background:var(--ink); color:var(--paper); padding:11px 22px; border-radius:999px; font-size:14px; letter-spacing:1px;
    opacity:0; transition:opacity .2s, transform .2s; pointer-events:none; z-index:50;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .toast.act{pointer-events:auto;}
  .toast .undo{margin-left:16px; color:#e7b07e; font-weight:600;}

  /* 本月可點：加箭頭提示 */
  .sumbox.month{position:relative; cursor:pointer;}
  .sumbox.month:active{background:var(--soft);}
  .mvchev{position:absolute; top:14px; right:12px; color:var(--faint); display:flex;}
  .mvchev .i{width:18px; height:18px;}

  /* 月曆畫面 */
  .monthview{position:fixed; inset:0; z-index:60; background:var(--paper); display:none;
    flex-direction:column; padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);}
  .monthview.show{display:flex; animation:fade .2s ease;}
  .mv-top{display:flex; align-items:center; justify-content:space-between; padding:14px 18px 6px;}
  .mv-top .back{display:flex; align-items:center; gap:4px; color:var(--accent); font-size:15px; letter-spacing:1px;}
  .mv-top .back .i{width:20px; height:20px;}
  .mv-nav{display:flex; align-items:center; justify-content:center; gap:22px; padding:6px 18px 0;}
  .mv-nav button{border:none; background:none; color:var(--sub); display:flex; padding:6px;}
  .mv-nav button .i{width:22px; height:22px;}
  .mv-nav .mv-title{font-size:18px; font-weight:600; letter-spacing:1px; min-width:120px; text-align:center; color:var(--txt);}
  .mv-total{text-align:center; color:var(--sub); font-size:13px; letter-spacing:1px; margin:6px 0 14px; font-variant-numeric:tabular-nums;}
  .cal{display:grid; grid-template-columns:repeat(7,1fr); gap:5px; padding:0 14px;}
  .cal .wd{text-align:center; font-size:11px; color:var(--faint); padding:2px 0 6px;}
  .cal .cell{aspect-ratio:1/1; border-radius:11px; background:var(--card); border:1px solid var(--line);
    display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:5px 2px; overflow:hidden;}
  .cal .cell.empty{background:none; border:none;}
  .cal .cell .d{font-size:12px; color:var(--sub);}
  .cal .cell .a{font-size:9.5px; color:var(--accent); margin-top:auto; font-variant-numeric:tabular-nums; line-height:1.2; text-align:center;}
  .cal .cell.has{background:var(--tint); border-color:transparent;}
  .cal .cell.today{border-color:var(--accent);}
  .cal .cell.today .d{color:var(--accent); font-weight:700;}
  .cal .cell.sel{outline:2px solid var(--ink); outline-offset:-1px;}
  .mv-day{flex:1; overflow-y:auto; padding:16px 18px 24px;}
  .mv-day .dh{font-size:13px; color:var(--sub); letter-spacing:1px; margin-bottom:10px; display:flex; justify-content:space-between;}
  .mv-day .dh b{color:var(--txt); font-variant-numeric:tabular-nums;}
  .mv-empty{text-align:center; color:var(--faint); font-size:13px; padding:24px 0;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="mark">
      <svg class="i" viewBox="0 0 24 24"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><path d="M12 18v3"/><path d="M8.5 21h7"/></svg>
    </span>
    <h1>唸記帳</h1>
    <span class="sub">say &amp; log</span>
  </header>

  <div class="summary">
    <div class="sumbox"><div class="k">今天</div><div class="v" id="sumToday">$0</div></div>
    <div class="sumbox month" id="monthBox"><div class="k" id="monLabel">本月</div><div class="v" id="sumMonth">$0</div><span class="mvchev"><svg class="i" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></span></div>
  </div>

  <div class="mic-card">
    <button class="bigrec" id="recBtn" aria-label="開始說話">
      <svg class="i" viewBox="0 0 24 24"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><path d="M12 18v3"/><path d="M8.5 21h7"/></svg>
    </button>
    <div class="reclabel" id="recLabel">點一下，說出花費</div>

    <details class="manual">
      <summary>手動輸入</summary>
      <textarea id="raw" rows="1" placeholder="例如：午餐排骨飯 120"></textarea>
      <button class="addbtn" id="parseBtn">記一筆</button>
    </details>

    <!-- 解析確認卡 -->
    <div class="review" id="review">
      <div class="lbl">金額</div>
      <div class="amtrow"><span class="cur">$</span><input id="amt" type="number" inputmode="decimal" step="1"></div>
      <div class="lbl">分類</div>
      <div class="cats" id="cats"></div>
      <div class="lbl">項目</div>
      <input id="note" type="text" placeholder="（選填）">
      <div class="lbl">日期</div>
      <input id="edate" type="date">
      <div class="acts">
        <button class="btn-cancel" id="cancelBtn">取消</button>
        <button class="btn-ok" id="confirmBtn">加入</button>
      </div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab sel" data-tab="list">明細</div>
    <div class="tab" data-tab="stat">本月分類</div>
  </div>

  <div id="viewList"></div>
  <div id="viewStat" style="display:none"></div>
</div>

<!-- 月曆畫面 -->
<div class="monthview" id="monthView">
  <div class="mv-top">
    <button class="back" id="mvBack"><svg class="i" viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg>返回</button>
    <span></span>
  </div>
  <div class="mv-nav">
    <button id="mvPrev" aria-label="上個月"><svg class="i" viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg></button>
    <div class="mv-title" id="mvTitle">2026年6月</div>
    <button id="mvNext" aria-label="下個月"><svg class="i" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></button>
  </div>
  <div class="mv-total" id="mvTotal">本月合計 $0</div>
  <div class="cal" id="cal"></div>
  <div class="mv-day" id="mvDay"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============ 資料層 ============ */
const KEY='saymoney.entries.v1';
function load(){ try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return[]} }
function save(a){ localStorage.setItem(KEY, JSON.stringify(a)); }
let entries = load();

/* ============ 線條 SVG 圖示（無 emoji） ============ */
const SVG = {
  food:'<svg class="i" viewBox="0 0 24 24"><path d="M5 3v7a2 2 0 0 0 4 0V3"/><path d="M7 10v11"/><path d="M17 3c-1.7 0-3 2-3 5s1.3 4 3 4"/><path d="M17 3v18"/></svg>',
  trans:'<svg class="i" viewBox="0 0 24 24"><path d="M6 13l1.4-4.6A2 2 0 0 1 9.3 7h5.4a2 2 0 0 1 1.9 1.4L18 13"/><rect x="4" y="13" width="16" height="5" rx="1.5"/><circle cx="7.5" cy="18.5" r="1.4"/><circle cx="16.5" cy="18.5" r="1.4"/></svg>',
  shop:'<svg class="i" viewBox="0 0 24 24"><path d="M6.5 8h11l1 12.5h-13z"/><path d="M9 8a3 3 0 0 1 6 0"/></svg>',
  fun:'<svg class="i" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M10 8.5l5 3.5-5 3.5z"/></svg>',
  home:'<svg class="i" viewBox="0 0 24 24"><path d="M3 11l9-7 9 7"/><path d="M5.5 9.5V20h13V9.5"/><path d="M10 20v-5h4v5"/></svg>',
  health:'<svg class="i" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="4.5"/><path d="M12 8.5v7M8.5 12h7"/></svg>',
  other:'<svg class="i" viewBox="0 0 24 24"><circle cx="5.5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="18.5" cy="12" r="1.5"/></svg>',
  x:'<svg class="i" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>',
  leaf:'<svg class="i" viewBox="0 0 24 24"><path d="M5 19c0-8 6-13 14-13 0 8-5 14-13 14"/><path d="M5 19c2-4 5-6 9-7"/></svg>'
};

/* ============ 分類設定 ============ */
const CATS = [
  {id:'food',  name:'餐飲', kw:['早餐','午餐','晚餐','宵夜','飲料','咖啡','奶茶','手搖','飯','麵','便當','餐','吃','喝','茶','麥當勞','星巴克','火鍋','燒烤','零食','點心','小吃','水果','超商','便利商店','7-11','全家','拉麵','壽司','披薩','蛋糕','早午餐']},
  {id:'trans', name:'交通', kw:['捷運','公車','計程車','小黃','高鐵','火車','加油','油錢','停車','機票','車票','uber','ubike','youbike','客運','悠遊卡','過路費','停車費','汽油']},
  {id:'shop',  name:'購物', kw:['買','衣服','鞋','褲','超市','全聯','大潤發','家樂福','momo','蝦皮','網購','日用品','文具','化妝品','保養品','包包','飾品','3c','耳機','充電']},
  {id:'fun',   name:'娛樂', kw:['電影','遊戲','唱歌','ktv','旅遊','門票','演唱會','訂閱','netflix','spotify','youtube','展覽','按摩','spa','酒','夜店']},
  {id:'home',  name:'居家', kw:['房租','租金','水費','電費','瓦斯','網路','電話費','手機費','家具','家電','清潔','衛生紙','管理費']},
  {id:'health',name:'醫療', kw:['看病','醫院','藥','診所','健保','掛號','牙醫','眼鏡','隱形眼鏡','保健','維他命','看醫生']},
  {id:'other', name:'其他', kw:[]},
];
CATS.forEach(c=>c.icon=SVG[c.id]);
const catById = id => CATS.find(c=>c.id===id) || CATS[CATS.length-1];

/* ============ 中文數字 → 阿拉伯數字 ============ */
const CN_DIGIT={'零':0,'〇':0,'一':1,'二':2,'兩':2,'两':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'壹':1,'貳':2,'參':3,'肆':4,'伍':5,'陸':6,'柒':7,'捌':8,'玖':9};
const CN_UNIT={'十':10,'拾':10,'百':100,'佰':100,'千':1000,'仟':1000,'萬':10000,'万':10000,'億':100000000};
function cnToNum(s){
  if(!s) return null;
  let total=0, section=0, num=0, seen=false, lastUnit=0, zeroSinceUnit=false;
  for(const ch of s){
    if(ch in CN_DIGIT){ num=CN_DIGIT[ch]; seen=true; if(num===0) zeroSinceUnit=true; }
    else if(ch in CN_UNIT){
      const u=CN_UNIT[ch];
      if(u>=10000){ section=(section+(num||0))*u; total+=section; section=0; }
      else { if(num===0) num=1; section += num*u; }
      lastUnit=u; num=0; seen=true; zeroSinceUnit=false;
    } else return null; // 含非數字字元，放棄
  }
  if(!seen) return null;
  // 台語口語尾數簡說：三百五=350、兩千三=2300、一萬二=12000（結尾是裸數字、中間沒講「零」、且已有單位）
  if(num>0 && lastUnit>=10 && !zeroSinceUnit) num *= lastUnit/10;
  return total+section+num;
}

/* ============ 解析一句話 ============ */
function parse(text){
  const raw=(text||'').trim();
  let amount=null, amtMatch=null;
  // 1) 阿拉伯數字（可帶千分位/小數），優先靠近「元/塊/$」的
  const numRe=/(?:\$|＄)?\s*([0-9０-９][0-9０-９,，]*(?:[.．][0-9０-９]+)?)\s*(元|塊|塊錢|圓|円|kw|k)?/g;
  let m, best=null;
  while((m=numRe.exec(raw))){
    const numStr=m[1].replace(/[，,]/g,'').replace(/[０-９]/g,d=>'0123456789'['０１２３４５６７８９'.indexOf(d)]).replace(/[．]/g,'.');
    let val=parseFloat(numStr);
    if(m[2]==='k'||m[2]==='kw') val*=1000;
    if(isNaN(val)) continue;
    const hasCur=!!m[2] || raw[m.index]==='$' || raw[m.index]==='＄';
    if(!best || (hasCur && !best.cur)) best={val, cur:hasCur, idx:m.index, len:m[0].length, str:m[0]};
  }
  if(best){ amount=best.val; amtMatch=best.str; }
  // 2) 中文數字（找「...元/塊」或一串中文數字）
  if(amount===null){
    const cnRe=/([零〇一二兩两三四五六七八九十百千萬万億壹貳參肆伍陸柒捌玖拾佰仟]+)\s*(元|塊|塊錢|圓)?/g;
    while((m=cnRe.exec(raw))){
      const v=cnToNum(m[1]);
      if(v!==null && v>0){ amount=v; amtMatch=m[0]; break; }
    }
  }
  // 分類
  const low=raw.toLowerCase();
  let cat='other';
  outer: for(const c of CATS){
    for(const k of c.kw){ if(low.includes(k.toLowerCase())){ cat=c.id; break outer; } }
  }
  // 項目：把金額字串與貨幣/動詞雜字去掉
  let note=raw;
  if(amtMatch) note=note.replace(amtMatch,' ');
  note=note.replace(/[0-9０-９.．,，]+/g,' ')
           .replace(/(元|塊錢|塊|圓|円|\$|＄|花了|花|付了|付|共|總共|大概|差不多|塊錢)/g,' ')
           .replace(/[零〇一二兩两三四五六七八九十百千萬万億壹貳參肆伍陸柒捌玖拾佰仟]+/g,' ')
           .replace(/\s+/g,' ').trim();
  if(!note) note = catById(cat).name;
  return {amount, cat, note, raw};
}

/* ============ 語音：點一下→講→自動記帳（Web Speech 支援時） ============ */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let rec=null, listening=false, pasteMode=false;
const recBtn=document.getElementById('recBtn');
const recLabel=document.getElementById('recLabel');
const rawEl=document.getElementById('raw');
const manualBox=document.querySelector('.manual');

function setLive(b){
  listening=b; recBtn.classList.toggle('live',b);
  recLabel.textContent = b ? '聆聽中…說完停一下就好' : '點一下，說出花費';
}
function startRec(){
  if(!SR){ manualBox.open=true; rawEl.focus(); toast('此裝置請用下方手動輸入'); return; }
  try{
    rec=new SR(); rec.lang='zh-TW'; rec.interimResults=true; rec.continuous=false;
    let finalText='';
    rec.onresult=e=>{ let t=''; for(let i=0;i<e.results.length;i++) t+=e.results[i][0].transcript; finalText=t; recLabel.textContent=t||'聆聽中…'; };
    rec.onerror=()=>{ setLive(false); recLabel.textContent='沒聽到，再點一下試試'; };
    rec.onend=()=>{
      setLive(false);
      const t=finalText.trim();
      if(!t){ recLabel.textContent='沒聽到，再點一下試試'; return; }
      const r=parse(t);
      if(r.amount!=null){ commitDirect(r); }
      else{ // 沒聽到金額 → 開手動確認卡讓你補
        rawEl.value=t; rawEl.style.height='auto'; rawEl.style.height=rawEl.scrollHeight+'px';
        manualBox.open=true; doParse(); recLabel.textContent='沒聽到金額，幫你開啟確認';
      }
    };
    rec.start(); setLive(true);
  }catch(e){ setLive(false); manualBox.open=true; rawEl.focus(); }
}
recBtn.addEventListener('click',()=>{
  if(pasteMode){ doPaste(); return; }
  if(listening){ try{rec.stop()}catch(e){} } else startRec();
});

/* 由捷徑帶來的「貼上記帳」：讀剪貼簿→解析→自動記 */
function doPaste(){
  if(!(navigator.clipboard && navigator.clipboard.readText)){
    pasteMode=false; manualBox.open=true; rawEl.focus(); toast('此裝置請用手動輸入'); return;
  }
  navigator.clipboard.readText().then(t=>{
    t=(t||'').trim();
    if(!t){ toast('剪貼簿是空的，再試一次'); return; }
    const r=parse(t);
    pasteMode=false; recLabel.textContent='點一下，說出花費';
    if(r.amount!=null){ commitDirect(r); }
    else{ rawEl.value=t; rawEl.style.height='auto'; rawEl.style.height=rawEl.scrollHeight+'px'; manualBox.open=true; doParse(); }
  }).catch(()=>{ toast('要按「允許貼上」才能記帳'); });
}

/* 直接記帳（語音解析成功時，不用按確認；附「撤銷」） */
function commitDirect(r){
  const id='e'+Date.now()+Math.floor(Math.random()*1e4);
  entries.unshift({id, ts:Date.now(), amount:r.amount, category:r.cat,
    note:(r.note||catById(r.cat).name), raw:r.raw});
  save(entries); render();
  recLabel.textContent='已記！點麥克風記下一筆';
  toast('已記　'+(r.note||catById(r.cat).name)+'　'+fmt(r.amount), id);
}

/* ============ 解析 → 確認卡 ============ */
let pending=null;
const review=document.getElementById('review');
const amtEl=document.getElementById('amt');
const noteEl=document.getElementById('note');
const edateEl=document.getElementById('edate');
const catsEl=document.getElementById('cats');

function renderCatChips(sel){
  catsEl.innerHTML='';
  CATS.forEach(c=>{
    const b=document.createElement('button');
    b.className='cat'+(c.id===sel?' sel':''); b.innerHTML=c.icon+'<span>'+c.name+'</span>';
    b.onclick=()=>{ pending.cat=c.id; [...catsEl.children].forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); };
    catsEl.appendChild(b);
  });
}
function todayStr(d){ d=d||new Date(); const p=n=>String(n).padStart(2,'0'); return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()); }

function doParse(){
  const r=parse(rawEl.value);
  if(r.amount===null){ toast('沒聽到金額，補一下數字'); amtEl.value=''; }
  pending={cat:r.cat, note:r.note, raw:r.raw};
  amtEl.value = r.amount!==null ? r.amount : '';
  noteEl.value = r.note;
  edateEl.value = todayStr();
  renderCatChips(r.cat);
  review.classList.add('show');
  if(r.amount===null) amtEl.focus();
}
document.getElementById('parseBtn').addEventListener('click',()=>{
  if(!rawEl.value.trim()){ rawEl.focus(); return; } doParse();
});
document.getElementById('cancelBtn').addEventListener('click',()=>{ review.classList.remove('show'); });
document.getElementById('confirmBtn').addEventListener('click',()=>{
  const amount=parseFloat(amtEl.value);
  if(isNaN(amount)||amount<=0){ amtEl.focus(); toast('金額要填數字'); return; }
  const d=edateEl.value? new Date(edateEl.value+'T12:00:00') : new Date();
  entries.unshift({id:'e'+Date.now()+Math.floor(Math.random()*1e4), ts:d.getTime(),
    amount, category:pending.cat, note:(noteEl.value.trim()||catById(pending.cat).name), raw:pending.raw});
  save(entries);
  review.classList.remove('show'); rawEl.value=''; rawEl.style.height='auto'; pending=null;
  render(); toast('已記一筆');
});

/* ============ 刪除 ============ */
function del(id){ entries=entries.filter(e=>e.id!==id); save(entries); render(); }

/* ============ 顯示 ============ */
function fmt(n){ return '$'+Math.round(n).toLocaleString('en-US'); }
function sameMonth(ts,now){ const d=new Date(ts); return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth(); }
function sameDay(ts,now){ const d=new Date(ts); return todayStr(d)===todayStr(now); }

function render(){
  const now=new Date();
  let today=0, month=0;
  entries.forEach(e=>{ if(sameDay(e.ts,now)) today+=e.amount; if(sameMonth(e.ts,now)) month+=e.amount; });
  document.getElementById('sumToday').textContent=fmt(today);
  document.getElementById('sumMonth').textContent=fmt(month);
  document.getElementById('monLabel').textContent=(now.getMonth()+1)+'月';

  // 明細
  const vl=document.getElementById('viewList'); vl.innerHTML='';
  if(!entries.length){
    vl.innerHTML='<div class="empty"><div class="big">'+SVG.leaf+'</div>還沒有任何紀錄<br>點上面的麥克風，講出第一筆花費吧</div>';
  }else{
    const byDay={};
    entries.forEach(e=>{ const k=todayStr(new Date(e.ts)); (byDay[k]=byDay[k]||[]).push(e); });
    Object.keys(byDay).sort().reverse().forEach(day=>{
      const list=byDay[day]; const sum=list.reduce((a,e)=>a+e.amount,0);
      const g=document.createElement('div'); g.className='daygroup';
      const lbl = day===todayStr(now)?'今天 · '+day : day;
      g.innerHTML='<div class="dayhead"><span>'+lbl+'</span><span class="sum">'+fmt(sum)+'</span></div>';
      list.forEach(e=>{
        const c=catById(e.category);
        const it=document.createElement('div'); it.className='item';
        it.innerHTML='<div class="ico">'+c.icon+'</div><div class="mid"><div class="nm"></div>'+
          '<div class="ct">'+c.name+'</div></div><div class="amt">'+fmt(e.amount)+'</div>'+
          '<div class="del">'+SVG.x+'</div>';
        it.querySelector('.nm').textContent=e.note;
        it.querySelector('.del').onclick=()=>{ if(confirm('刪除「'+e.note+' '+fmt(e.amount)+'」？')) del(e.id); };
        g.appendChild(it);
      });
      vl.appendChild(g);
    });
  }

  // 月分類統計
  const vs=document.getElementById('viewStat'); vs.innerHTML='';
  const tot={}; let mtotal=0;
  entries.forEach(e=>{ if(sameMonth(e.ts,now)){ tot[e.category]=(tot[e.category]||0)+e.amount; mtotal+=e.amount; } });
  if(!mtotal){ vs.innerHTML='<div class="empty">本月還沒有紀錄</div>'; }
  else{
    const max=Math.max(...Object.values(tot));
    CATS.forEach(c=>{
      const v=tot[c.id]; if(!v) return;
      const row=document.createElement('div'); row.className='statrow';
      row.innerHTML='<div class="ico">'+c.icon+'</div><div class="nm">'+c.name+'</div>'+
        '<div class="bar"><i style="width:'+(v/max*100)+'%"></i></div>'+
        '<div class="vv">'+fmt(v)+' · '+Math.round(v/mtotal*100)+'%</div>';
      vs.appendChild(row);
    });
  }
}

/* tabs */
document.querySelectorAll('.tab').forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('sel')); t.classList.add('sel');
    const isList=t.dataset.tab==='list';
    document.getElementById('viewList').style.display=isList?'':'none';
    document.getElementById('viewStat').style.display=isList?'none':'';
  };
});

/* ============ 月曆畫面（點「本月」打開、可前後切月） ============ */
const monthView=document.getElementById('monthView');
const calEl=document.getElementById('cal');
const mvTitle=document.getElementById('mvTitle');
const mvTotal=document.getElementById('mvTotal');
const mvDay=document.getElementById('mvDay');
let mvYear, mvMonth, mvSel=null;

function openMonth(){
  const now=new Date();
  mvYear=now.getFullYear(); mvMonth=now.getMonth(); mvSel=todayStr(now);
  monthView.classList.add('show'); renderMonth();
}
function closeMonth(){ monthView.classList.remove('show'); }
function shiftMonth(d){
  mvMonth+=d;
  if(mvMonth<0){ mvMonth=11; mvYear--; }
  if(mvMonth>11){ mvMonth=0; mvYear++; }
  mvSel=null; renderMonth();
}
function renderMonth(){
  const p=n=>String(n).padStart(2,'0');
  mvTitle.textContent=mvYear+'年'+(mvMonth+1)+'月';
  const dayTot={}; let mTot=0;
  entries.forEach(e=>{ const d=new Date(e.ts);
    if(d.getFullYear()===mvYear && d.getMonth()===mvMonth){ const k=todayStr(d); dayTot[k]=(dayTot[k]||0)+e.amount; mTot+=e.amount; } });
  mvTotal.textContent='本月合計 '+fmt(mTot);
  const first=new Date(mvYear,mvMonth,1).getDay();
  const days=new Date(mvYear,mvMonth+1,0).getDate();
  const todayK=todayStr(new Date());
  let html='';
  ['日','一','二','三','四','五','六'].forEach(w=>html+='<div class="wd">'+w+'</div>');
  for(let i=0;i<first;i++) html+='<div class="cell empty"></div>';
  for(let dn=1;dn<=days;dn++){
    const k=mvYear+'-'+p(mvMonth+1)+'-'+p(dn);
    const amt=dayTot[k];
    let cls='cell'; if(amt) cls+=' has'; if(k===todayK) cls+=' today'; if(k===mvSel) cls+=' sel';
    html+='<div class="'+cls+'" data-k="'+k+'"><div class="d">'+dn+'</div>'+(amt?'<div class="a">'+fmt(amt)+'</div>':'')+'</div>';
  }
  calEl.innerHTML=html;
  calEl.querySelectorAll('.cell[data-k]').forEach(c=>{ c.onclick=()=>{ mvSel=c.dataset.k; renderMonth(); }; });
  renderMonthDay();
}
function renderMonthDay(){
  if(!mvSel){ mvDay.innerHTML=''; return; }
  const list=entries.filter(e=>todayStr(new Date(e.ts))===mvSel);
  const sum=list.reduce((a,e)=>a+e.amount,0);
  const parts=mvSel.split('-');
  let html='<div class="dh"><span>'+Number(parts[1])+'月'+Number(parts[2])+'日</span><b>'+fmt(sum)+'</b></div>';
  if(!list.length){ mvDay.innerHTML=html+'<div class="mv-empty">這天沒有紀錄</div>'; return; }
  mvDay.innerHTML=html;
  list.forEach(e=>{
    const c=catById(e.category);
    const it=document.createElement('div'); it.className='item';
    it.innerHTML='<div class="ico">'+c.icon+'</div><div class="mid"><div class="nm"></div><div class="ct">'+c.name+
      '</div></div><div class="amt">'+fmt(e.amount)+'</div><div class="del">'+SVG.x+'</div>';
    it.querySelector('.nm').textContent=e.note;
    it.querySelector('.del').onclick=()=>{ if(confirm('刪除「'+e.note+' '+fmt(e.amount)+'」？')){ del(e.id); renderMonth(); } };
    mvDay.appendChild(it);
  });
}
document.getElementById('monthBox').addEventListener('click', openMonth);
document.getElementById('mvBack').addEventListener('click', closeMonth);
document.getElementById('mvPrev').addEventListener('click',()=>shiftMonth(-1));
document.getElementById('mvNext').addEventListener('click',()=>shiftMonth(1));

function toast(msg, undoId){
  const t=document.getElementById('toast'); t.innerHTML='';
  t.appendChild(document.createTextNode(msg));
  if(undoId){
    const u=document.createElement('span'); u.className='undo'; u.textContent='撤銷';
    u.onclick=()=>{ del(undoId); t.classList.remove('show','act'); recLabel.textContent='已撤銷'; };
    t.appendChild(u); t.classList.add('act');
  } else t.classList.remove('act');
  t.classList.add('show'); clearTimeout(t._h);
  t._h=setTimeout(()=>t.classList.remove('show','act'), undoId?4000:1600);
}

/* 自動長高的輸入框 */
rawEl.addEventListener('input',()=>{ rawEl.style.height='auto'; rawEl.style.height=rawEl.scrollHeight+'px'; });

render();

/* 由捷徑/小工具帶入語音文字：?say=午餐120 → 自動解析、跳出確認卡 */
(function(){
  try{
    const p=new URLSearchParams(location.search);
    if(p.get('paste')==='1'){
      pasteMode=true;
      recLabel.textContent='點一下，貼上剛剛說的話';
      history.replaceState(null,'',location.pathname);
      return;
    }
    const said=p.get('say')||p.get('t')||p.get('text');
    if(said && said.trim()){
      const r=parse(said.trim());
      if(r.amount!=null){ commitDirect(r); }
      else{
        rawEl.value=said.trim();
        rawEl.style.height='auto'; rawEl.style.height=rawEl.scrollHeight+'px';
        manualBox.open=true; doParse();
      }
      // 清掉網址參數，避免重整時重複帶入
      history.replaceState(null,'',location.pathname);
    }
  }catch(e){}
})();

/* Service Worker：離線可用 */
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
</script>
